<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Monsoon Portal</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-brand">
      <span class="logo">🌧</span>
      <div>
        <h1>Monsoon Portal</h1>
        <p class="subtitle">Islamabad clearance</p>
      </div>
    </div>
    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat stat-done">
        <span class="stat-value" id="stat-done">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="stat stat-pending">
        <span class="stat-value" id="stat-pending">0</span>
        <span class="stat-label">Pending</span>
      </div>
      <div class="stat stat-percent">
        <span class="stat-value" id="stat-percent">0%</span>
        <span class="stat-label">Done</span>
      </div>
    </div>
    <div class="header-actions">
      <span id="sync-badge" class="sync-badge sync-local">Sync</span>
      <button type="button" class="btn-panel-toggle" id="btn-panel-toggle" aria-label="Toggle panel">
        ☰ Panel
      </button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-handle" id="sidebar-handle"></div>

      <div class="sidebar-section">
        <h2>Map</h2>
        <div class="layer-buttons">
          <button type="button" class="layer-btn active" data-layer="osm">Street</button>
          <button type="button" class="layer-btn" data-layer="hybrid">Hybrid</button>
          <button type="button" class="layer-btn" data-layer="satellite">Satellite</button>
        </div>
      </div>

      <div class="sidebar-section">
        <label class="layer-toggle">
          <input type="checkbox" id="waterways-toggle" checked />
          <span>Waterways</span>
        </label>
      </div>

      <div class="sidebar-section">
        <h2>Filter</h2>
        <div class="filter-row">
          <button type="button" class="filter-btn active" data-filter="all">All</button>
          <button type="button" class="filter-btn" data-filter="done">Done</button>
          <button type="button" class="filter-btn" data-filter="pending">Pending</button>
        </div>
        <input type="search" id="search-input" class="search-input" placeholder="Search..." />
        <select id="category-filter" class="search-input category-select" aria-label="Category">
          <option value="all">All categories</option>
        </select>
      </div>

      <div class="sidebar-section sidebar-list-section">
        <h2>Points <span id="list-count" class="badge">0</span></h2>
        <ul id="point-list" class="point-list"></ul>
      </div>

      <div class="legend">
        <span class="legend-item"><span class="dot dot-done"></span> Done</span>
        <span class="legend-item"><span class="dot dot-pending"></span> Pending</span>
        <span class="legend-item"><span class="shape-icon shape-culvert pending"></span> Culvert</span>
        <span class="legend-item"><span class="shape-icon shape-bridge pending"></span> Bridge</span>
      </div>
    </aside>

    <div class="map-wrap">
      <div id="map"></div>
    </div>
  </main>

  <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>
  <div id="toast" class="toast" hidden></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
